<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Xenxia</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="verticalFlexbox">
            <div class="title_container">
                <div id="titlePart1">SNAKE</div>
                <div id="titlePart2">XENZIA</div>
            </div>
            <div class="instructions">
                <div id="instruction1">Use arrow keys to control the snake.</div>
                <div id="instruction2">Press any key to play again.</div>
            </div>
        </div>
        <div id="board"></div>
        <div class="score_container">
            <div id="scoreCount">Score : 0</div>
            <div id="hiscore">Hi-Score : 0</div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
